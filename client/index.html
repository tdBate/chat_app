<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatApp</title>
    <link rel="stylesheet" href="style.css" />
    <script src="index.js"></script>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" integrity="sha384-kzavj5fiMwLKzzD1f8S7TeoVIEi7uKHvbTA3ueZkrzYq75pNQUiUi6Dy98Q3fxb0" crossorigin="anonymous"></script>
</head>

<body>

    <!-- ===== BEJELENTKEZÉS / REGISZTRÁCIÓ ===== -->
    <div id="page-auth" class="page active">
        <div class="auth-container">
            <div class="auth-logo">ChatApp</div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Bejelentkezés</button>
                <button class="tab-btn" onclick="switchTab('register')">Regisztráció</button>
            </div>

            <div id="tab-login" class="auth-form">
                <div class="form-group">
                    <label>Email cím</label>
                    <input type="email" id="login-email" placeholder="pelda@email.com" />
                </div>
                <div class="form-group">
                    <label>Jelszó</label>
                    <input type="password" id="login-password" placeholder="••••••••" />
                </div>
                <div id="login-error" class="error-msg hidden"></div>
                <button class="btn-primary" id="btnConnect">Bejelentkezés</button>
                <p class="auth-hint">Demo: <strong>teszt@email.com</strong> / <strong>jelszo123</strong></p>
            </div>

            <div id="tab-register" class="auth-form hidden">
                <div class="form-group">
                    <label>Felhasználónév</label>
                    <input type="text" id="reg-username" placeholder="Felhasználónév" />
                </div>
                <div class="form-group">
                    <label>Email cím</label>
                    <input type="email" id="reg-email" placeholder="pelda@email.com" />
                </div>
                <div class="form-group">
                    <label>Jelszó</label>
                    <input type="password" id="reg-password" placeholder="Min. 6 karakter" />
                </div>
                <div id="reg-error" class="error-msg hidden"></div>
                <div id="reg-success" class="success-msg hidden"></div>
                <button class="btn-primary" onclick="handleRegister()">Regisztráció</button>
            </div>
        </div>
    </div>

    <!-- ===== FŐ APP ===== -->
    <div id="page-app" class="page hidden">

        <!-- Bal oldalsáv -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="app-name">ChatApp</span>
                <button class="theme-btn" onclick="toggleTheme()"></button>
            </div>

            <!-- Felhasználók listája -->
            <div class="sidebar-users" id="sidebar-users"></div>

            <!-- Lábléc: profil + kilépés -->
            <div class="sidebar-footer">
                <div class="user-chip" onclick="openProfile()" title="Profil">
                    <div class="avatar" id="sidebar-avatar">T</div>
                    <div class="user-chip-info">
                        <span class="user-chip-name" id="sidebar-username">Felhasználó</span>
                        <span class="user-chip-sub">Profil megtekintése</span>
                    </div>
                </div>
                <button class="btn-logout" onclick="handleLogout()">Kilépés</button>
            </div>
        </aside>

        <!-- Jobb: chat / profil tartalom -->
        <main class="main-content">

            <!-- Üres állapot -->
            <div id="view-empty" class="view active empty-state">
                <p>Válassz egy felhasználót a chathez</p>
            </div>

            <!-- DM chat -->
            <div id="view-dm" class="view hidden dm-view">
                <div class="chat-header">
                    <div class="avatar" id="chat-avatar">?</div>
                    <span id="chat-name">Felhasználó</span>
                </div>
                <div class="messages-list" id="dm-messages"></div>
                <div class="message-input-row">
                    <input type="text" id="dm-input" placeholder="Írj üzenetet..."
                        onkeydown="if(event.key==='Enter') sendDM()" />
                    <button class="btn-send" onclick="sendDM()">Küldés</button>
                </div>
            </div>

            <!-- Profil -->
            <div id="view-profile" class="view hidden">
                <div class="chat-header">
                    <span>Profil</span>
                </div>
                <div class="profile-body">
                    <div class="profile-avatar-big" id="profile-avatar">T</div>
                    <div class="profile-fields">
                        <div class="form-group">
                            <label>Felhasználónév</label>
                            <input type="text" id="profile-username" />
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profile-email" disabled />
                        </div>
                        <div id="profile-msg" class="success-msg hidden">Mentve!</div>
                        <div id="profile-error" class="error-msg hidden">Kérlek töltsd ki az összes mezőt.</div>
                        <button class="btn-primary" onclick="saveProfile()">Mentés</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div id="toast" class="toast hidden"></div>

</body>

</html>
